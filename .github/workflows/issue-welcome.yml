name: Issue Welcome

on:
  issues:
    types: [opened]

jobs:
  welcome:
    name: Welcome new issue
    runs-on: ubuntu-latest
    if: github.event.issue.user.type != 'Bot'
    permissions:
      issues: write

    steps:
      - name: Post welcome comment
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const issue = context.payload.issue;
            const author = issue.user.login;

            const body = [
              `Hey @${author}, thanks for opening this issue! 👋`,
              ``,
              `Before anyone starts working on this, please **comment below explaining your approach** — what you plan to do and how you plan to do it.`,
              ``,
              `A few things to keep in mind:`,
              `-  **Write the explanation yourself** — don't paste AI-generated text. We want to understand how *you* think about the problem.`,
              `-  **Wait to be assigned** before you start coding. This avoids two people solving the same thing at once.`,
              `-  Read [CONTRIBUTING.md](../blob/main/CONTRIBUTING.md) if you haven't already.`,
              ``,
              `Once a maintainer reviews your approach and assigns the issue to you, you're good to go. Looking forward to it! 🚀`,
            ].join('\n');

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: issue.number,
              body,
            });
