name: Auto Label New Issues

on:
  issues:
    types: [opened]

permissions:
  issues: write

jobs:
  auto-label:
    runs-on: ubuntu-latest
    steps:
      - name: Add ELUSOC label to new issues
        uses: actions/github-script@v7
        with:
          script: |
            const labelName = 'ELUSOC';
            
            // 1. Ensure the label exists, handle errors appropriately
            try {
              await github.rest.issues.createLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: labelName,
                color: '0366d6'
              });
            } catch (error) {
              // 422 means the label already exists, which is safe to ignore
              if (error.status !== 422 && error.response?.status !== 422) {
                throw error;
              }
            }
            
            // 2. Attach the label
            await github.rest.issues.addLabels({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: [labelName]
            });
