<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Feedback - Foodie</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
    :root {
      --primary: #f59e0b;
      --primary-dark: #d97706;
      --bg: #f8fafc;
      --card: rgba(255,255,255,0.85);
      --text: #1f2933;
      --muted: #6b7280;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
    }

    /* ===== HERO ===== */
    .hero {
      text-align: center;
      padding: 4rem 1rem;
      background: linear-gradient(135deg, #fbbf24, #f59e0b);
      color: white;
      border-radius: 0 0 60px 60px;
    }

    .hero h1 {
      font-size: 2.6rem;
      font-weight: 600;
    }

    .hero span {
      color: #fff7ed;
    }

    .hero p {
      margin-top: 0.5rem;
      opacity: 0.9;
    }

    /* ===== CONTAINER ===== */
    .feedback-container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 2rem;
      padding: 3rem 1.5rem;
      max-width: 1100px;
      margin: auto;
    }

    /* ===== CARD ===== */
    .feedback-card {
      background: var(--card);
      backdrop-filter: blur(10px);
      border-radius: 18px;
      padding: 1.8rem;
      box-shadow: 0 8px 25px rgba(0,0,0,0.08);
      transition: all 0.3s ease;
      border: 1px solid rgba(255,255,255,0.4);
    }

    .feedback-card:hover {
      transform: translateY(-6px);
      box-shadow: 0 14px 35px rgba(0,0,0,0.12);
    }

    .feedback-card h2 {
      color: var(--primary-dark);
      margin-bottom: 0.4rem;
      font-size: 1.4rem;
    }

    .feedback-card p {
      color: var(--muted);
      font-size: 0.95rem;
      margin-bottom: 1.2rem;
    }

    /* ===== FORM ===== */
    form {
      display: flex;
      flex-direction: column;
      gap: 0.9rem;
    }

    input, textarea {
      padding: 0.75rem 0.9rem;
      border-radius: 10px;
      border: 1px solid #e5e7eb;
      font-size: 0.9rem;
      background: #fff;
      transition: all 0.25s ease;
    }

    input:focus, textarea:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(245,158,11,0.2);
      outline: none;
    }

    textarea {
      min-height: 90px;
      resize: none;
    }

    /* ===== RATING ===== */
    .rating {
      display: flex;
      flex-direction: row-reverse;
      gap: 0.3rem;
    }

    .rating input {
      display: none;
    }

    .rating label {
      font-size: 1.4rem;
      color: #d1d5db;
      cursor: pointer;
      transition: 0.2s;
    }

    .rating label:hover {
      transform: scale(1.15);
    }

    .rating input:checked ~ label,
    .rating label:hover,
    .rating label:hover ~ label {
      color: #fbbf24;
    }

    /* ===== BUTTON ===== */
    .submit-btn {
      background: var(--primary);
      color: white;
      border: none;
      padding: 0.75rem;
      border-radius: 10px;
      font-weight: 500;
      cursor: pointer;
      transition: 0.25s;
    }

    .submit-btn:hover {
      background: var(--primary-dark);
      transform: translateY(-1px);
    }

    /* ===== TOAST ===== */
    .toast {
      position: fixed;
      top: 20px;
      right: -300px;
      background: #16a34a;
      color: white;
      padding: 0.8rem 1.2rem;
      border-radius: 8px;
      font-size: 0.9rem;
      transition: 0.4s;
    }

    .toast.show {
      right: 20px;
    }

    /* ===== FOOTER ===== */
    footer {
      text-align: center;
      padding: 1.5rem;
      background: #f59e0b;
      color: white;
      margin-top: 2rem;
      border-radius: 40px 40px 0 0;
      font-size: 0.9rem;
    }

    /* ===== MOBILE ===== */
    @media(max-width:768px){
      .hero h1 {
        font-size: 2rem;
      }
    }
  </style>
</head>

<body>

  <section class="hero">
    <h1>Share Your <span>Feedback</span></h1>
    <p>Your opinion helps us improve 💛</p>
  </section>

  <section class="feedback-container">

    <div class="feedback-card">
      <h2>🌐 Website</h2>
      <p>Feedback on UI & navigation</p>
      <form>
        <input type="text" placeholder="Your Name" required>
        <input type="email" placeholder="Your Email" required>

        <div class="rating">
          <input type="radio" name="web" id="w5" required><label for="w5">★</label>
          <input type="radio" name="web" id="w4"><label for="w4">★</label>
          <input type="radio" name="web" id="w3"><label for="w3">★</label>
          <input type="radio" name="web" id="w2"><label for="w2">★</label>
          <input type="radio" name="web" id="w1"><label for="w1">★</label>
        </div>

        <textarea placeholder="Write your feedback..." required></textarea>
        <button class="submit-btn">Submit</button>
      </form>
    </div>

    <div class="feedback-card">
      <h2>📱 App</h2>
      <p>Your mobile experience</p>
      <form>
        <input type="text" placeholder="Your Name" required>
        <input type="email" placeholder="Your Email" required>

        <div class="rating">
          <input type="radio" name="app" id="a5" required><label for="a5">★</label>
          <input type="radio" name="app" id="a4"><label for="a4">★</label>
          <input type="radio" name="app" id="a3"><label for="a3">★</label>
          <input type="radio" name="app" id="a2"><label for="a2">★</label>
          <input type="radio" name="app" id="a1"><label for="a1">★</label>
        </div>

        <textarea placeholder="Write your feedback..." required></textarea>
        <button class="submit-btn">Submit</button>
      </form>
    </div>

    <div class="feedback-card">
      <h2>🚚 Service</h2>
      <p>Delivery & support experience</p>
      <form>
        <input type="text" placeholder="Your Name" required>
        <input type="email" placeholder="Your Email" required>

        <div class="rating">
          <input type="radio" name="service" id="s5" required><label for="s5">★</label>
          <input type="radio" name="service" id="s4"><label for="s4">★</label>
          <input type="radio" name="service" id="s3"><label for="s3">★</label>
          <input type="radio" name="service" id="s2"><label for="s2">★</label>
          <input type="radio" name="service" id="s1"><label for="s1">★</label>
        </div>

        <textarea placeholder="Write your feedback..." required></textarea>
        <button class="submit-btn">Submit</button>
      </form>
    </div>

  </section>

  <div class="toast" id="toast">Feedback submitted successfully!</div>

  <footer>
    <p>&copy; 2025 Foodie. All rights reserved.</p>
  </footer>

  <script>
    const forms = document.querySelectorAll("form");
    const toast = document.getElementById("toast");

    forms.forEach(form => {
      form.addEventListener("submit", e => {
        e.preventDefault();
        toast.classList.add("show");
        setTimeout(() => toast.classList.remove("show"), 2000);
        form.reset();
      });
    });
  </script>

</body>
</html>
